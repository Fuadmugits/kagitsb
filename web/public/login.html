<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — KagaITSB Dashboard</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="login-container">
        <div class="login-card fade-in">
            <div style="text-align:center;font-size:3rem;margin-bottom:1rem;">🔐</div>
            <h1 class="login-title">Owner Login</h1>
            <p class="login-sub">Masuk ke dashboard owner</p>
            <form id="loginForm">
                <div class="form-group">
                    <label class="form-label">Username</label>
                    <input type="text" class="form-input" id="username" placeholder="Masukkan username" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" class="form-input" id="password" placeholder="Masukkan password" required>
                </div>
                <div id="error" style="color:var(--red);font-size:0.85rem;margin-bottom:1rem;display:none;"></div>
                <button type="submit" class="btn btn-primary btn-full">Masuk</button>
            </form>
            <div class="login-footer">
                <a href="/">← Kembali ke beranda</a>
            </div>
        </div>
    </div>
    <script>
        if (localStorage.getItem('token')) window.location.href = '/dashboard';
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const errEl = document.getElementById('error');
            errEl.style.display = 'none';
            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username: document.getElementById('username').value,
                        password: document.getElementById('password').value,
                    })
                });
                const data = await res.json();
                if (!res.ok) { errEl.textContent = data.error; errEl.style.display = 'block'; return; }
                localStorage.setItem('token', data.token);
                localStorage.setItem('user', JSON.stringify(data.user));
                window.location.href = '/dashboard';
            } catch (err) { errEl.textContent = 'Gagal koneksi ke server'; errEl.style.display = 'block'; }
        });
    </script>
</body>
</html>
